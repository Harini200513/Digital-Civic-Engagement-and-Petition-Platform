<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civix Admin Panel</title>
    <style>
      :root {
        --bg: #f3f6fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #dbe3ef;
        --primary: #0f4c81;
        --success: #0f9d6a;
        --danger: #c0392b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(140deg, #eef3fb, #f8fafc);
        color: var(--text);
      }
      .shell {
        max-width: 1100px;
        margin: 32px auto;
        padding: 0 16px 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(15, 76, 129, 0.08);
      }
      h1, h2, h3, p { margin: 0; }
      .sub { color: var(--muted); margin-top: 6px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      input, textarea, button {
        border-radius: 10px;
        border: 1px solid var(--border);
        font: inherit;
      }
      input, textarea {
        width: 100%;
        padding: 10px 12px;
        background: #fff;
      }
      textarea { min-height: 72px; resize: vertical; }
      button {
        padding: 10px 14px;
        cursor: pointer;
        background: #f8fafc;
      }
      .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
      .btn-success { background: var(--success); color: white; border-color: var(--success); }
      .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
      .btn-ghost { background: white; }
      .hidden { display: none !important; }
      .grid { display: grid; gap: 14px; }
      .request {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: #fff;
      }
      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        background: #e6f7ef;
        color: #116149;
      }
      .msg {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
      }
      .msg.error { background: #fdecec; color: #8a2424; border: 1px solid #f8cccc; }
      .msg.success { background: #eaf8f1; color: #116149; border: 1px solid #cbeedc; }
      .top-gap { margin-top: 16px; }
      .docs a {
        color: #0f4c81;
        text-decoration: none;
      }
      .docs a:hover { text-decoration: underline; }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.45);
        backdrop-filter: blur(2px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        padding: 16px;
      }
      .modal-overlay.show { display: flex; }
      .modal-card {
        width: min(520px, 100%);
        background: #ffffff;
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.28);
        padding: 18px;
      }
      .modal-title {
        font-size: 20px;
        font-weight: 700;
      }
      .modal-text {
        color: var(--muted);
        margin-top: 8px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 16px;
      }
      .modal-actions button {
        min-width: 90px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="card" id="loginCard">
        <h1>Civix Admin Panel</h1>
        <p class="sub">Review and approve official verification requests.</p>
        <div class="grid top-gap">
          <div>
            <label>Admin Username</label>
            <input id="username" placeholder="Singh" />
          </div>
          <div>
            <label>Admin Password</label>
            <input id="password" type="password" placeholder="5544" />
          </div>
          <div class="row">
            <button class="btn-primary" id="loginBtn">Sign In</button>
          </div>
        </div>
        <div id="loginMessage"></div>
      </div>

      <div class="card hidden" id="dashboardCard">
        <div class="row" style="justify-content: space-between; align-items: center;">
          <div>
            <h2>Pending Verification Requests</h2>
            <p class="sub">Approve or reject officials after document review.</p>
          </div>
          <div class="row">
            <button class="btn-ghost" id="refreshBtn">Refresh</button>
            <button class="btn-danger" id="logoutBtn">Logout</button>
          </div>
        </div>
        <div id="dashboardMessage"></div>
        <div id="requestList" class="grid top-gap"></div>

        <div class="top-gap" style="margin-top: 24px;">
          <div class="row" style="justify-content: space-between; align-items: center;">
            <div>
              <h2>User Management</h2>
              <p class="sub">Delete citizen and official accounts from the database.</p>
            </div>
            <div class="row">
              <select id="roleFilter">
                <option value="">All</option>
                <option value="citizen">Citizen</option>
                <option value="official">Official</option>
              </select>
              <button class="btn-ghost" id="reloadUsersBtn">Reload Users</button>
            </div>
          </div>
          <div id="userList" class="grid top-gap"></div>
        </div>
      </div>
    </div>

    <div id="confirmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-card">
        <h3 id="confirmTitle" class="modal-title">Confirm action</h3>
        <p id="confirmText" class="modal-text"></p>
        <div class="modal-actions">
          <button class="btn-ghost" id="confirmCancelBtn">Cancel</button>
          <button class="btn-danger" id="confirmOkBtn">Delete</button>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:5000/api/admin";
      const loginCard = document.getElementById("loginCard");
      const dashboardCard = document.getElementById("dashboardCard");
      const loginMessage = document.getElementById("loginMessage");
      const dashboardMessage = document.getElementById("dashboardMessage");
      const requestList = document.getElementById("requestList");
      const userList = document.getElementById("userList");
      const roleFilter = document.getElementById("roleFilter");
      const confirmModal = document.getElementById("confirmModal");
      const confirmText = document.getElementById("confirmText");
      const confirmOkBtn = document.getElementById("confirmOkBtn");
      const confirmCancelBtn = document.getElementById("confirmCancelBtn");

      const setMessage = (target, text, type) => {
        if (!text) {
          target.innerHTML = "";
          return;
        }
        target.innerHTML = `<div class="msg ${type}">${text}</div>`;
      };

      const getToken = () => localStorage.getItem("admin_token");

      const switchView = (isLoggedIn) => {
        loginCard.classList.toggle("hidden", isLoggedIn);
        dashboardCard.classList.toggle("hidden", !isLoggedIn);
      };

      const adminFetch = async (url, options = {}) => {
        const token = getToken();
        const headers = options.headers || {};
        headers.Authorization = `Bearer ${token}`;
        return fetch(url, { ...options, headers });
      };

      const confirmAction = (message) =>
        new Promise((resolve) => {
          confirmText.textContent = message;
          confirmModal.classList.add("show");

          const cleanup = () => {
            confirmModal.classList.remove("show");
            confirmOkBtn.onclick = null;
            confirmCancelBtn.onclick = null;
            confirmModal.onclick = null;
            document.onkeydown = null;
          };

          confirmOkBtn.onclick = () => {
            cleanup();
            resolve(true);
          };
          confirmCancelBtn.onclick = () => {
            cleanup();
            resolve(false);
          };
          confirmModal.onclick = (event) => {
            if (event.target === confirmModal) {
              cleanup();
              resolve(false);
            }
          };
          document.onkeydown = (event) => {
            if (event.key === "Escape") {
              cleanup();
              resolve(false);
            }
          };
        });

      const renderRequests = (requests = []) => {
        if (!requests.length) {
          requestList.innerHTML = `<div class="request"><p>No pending verification requests.</p></div>`;
          return;
        }

        requestList.innerHTML = requests
          .map(({ user, documents }) => {
            const docsHtml = documents.length
              ? `<div class="docs">${documents
                  .map(
                    (doc) => `
                  <div>
                    <span>${doc.documentType}</span> -
                    <a href="#" onclick="openVerificationDocument('${doc.id}', '${(doc.metadata?.originalName || "document").replace(/'/g, "\\'")}'); return false;">Open ${doc.metadata?.originalName || "document"}</a>
                  </div>
                `
                  )
                  .join("")}</div>`
              : "<p class=\"sub\">No pending documents</p>";

            return `
              <div class="request">
                <div class="row" style="justify-content: space-between; align-items: center;">
                  <div>
                    <h3>${user.name}</h3>
                    <p class="sub">${user.email}</p>
                    <p class="sub">City: ${user.location?.jurisdiction?.city || user.location?.address || "-"}</p>
                  </div>
                  <span class="pill">${user.verificationStatus}</span>
                </div>
                <div class="top-gap">${docsHtml}</div>
                <div class="top-gap">
                  <textarea id="notes-${user.id}" placeholder="Optional review notes..."></textarea>
                </div>
                <div class="row top-gap">
                  <button class="btn-success" onclick="reviewRequest('${user.id}', 'approved')">Approve</button>
                  <button class="btn-danger" onclick="reviewRequest('${user.id}', 'rejected')">Reject</button>
                </div>
              </div>
            `;
          })
          .join("");
      };

      const loadRequests = async () => {
        try {
          setMessage(dashboardMessage, "", "");
          const res = await adminFetch(`${API}/verification/pending`);
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.message || "Failed to load requests");
          }
          renderRequests(data.requests || []);
        } catch (error) {
          setMessage(dashboardMessage, error.message, "error");
        }
      };

      const renderUsers = (users = []) => {
        if (!users.length) {
          userList.innerHTML = `<div class="request"><p>No users found.</p></div>`;
          return;
        }

        userList.innerHTML = users
          .map((user) => {
            const city = user.location?.jurisdiction?.city || user.location?.address || "-";
            const safeName = (user.name || "User").replace(/'/g, "\\'");
            const safeRole = (user.role || "").replace(/'/g, "\\'");

            return `
              <div class="request">
                <div class="row" style="justify-content: space-between; align-items: center;">
                  <div>
                    <h3>${user.name}</h3>
                    <p class="sub">${user.email}</p>
                    <p class="sub">Role: ${user.role}</p>
                    <p class="sub">Verification: ${user.verificationStatus || "-"}</p>
                    <p class="sub">City: ${city}</p>
                  </div>
                  <button class="btn-danger" onclick="deleteManagedUser('${user.id}', '${safeName}', '${safeRole}')">
                    Delete Account
                  </button>
                </div>
              </div>
            `;
          })
          .join("");
      };

      const loadUsers = async () => {
        try {
          const selectedRole = roleFilter.value;
          const query = selectedRole ? `?role=${encodeURIComponent(selectedRole)}` : "";
          const res = await adminFetch(`${API}/users${query}`);
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.message || "Failed to load users");
          }
          renderUsers(data.users || []);
        } catch (error) {
          setMessage(dashboardMessage, error.message, "error");
        }
      };

      window.reviewRequest = async (userId, decision) => {
        const notes = document.getElementById(`notes-${userId}`)?.value || "";
        try {
          const res = await adminFetch(`${API}/verification/review/${userId}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ decision, notes }),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.message || "Review failed");
          }
          setMessage(dashboardMessage, data.message, "success");
          await loadRequests();
        } catch (error) {
          setMessage(dashboardMessage, error.message, "error");
        }
      };

      window.openVerificationDocument = async (documentId, filename) => {
        try {
          setMessage(dashboardMessage, "", "");
          const res = await adminFetch(`${API}/verification/document/${documentId}`);
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.message || "Failed to open document");
          }

          const blob = await res.blob();
          const blobUrl = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = blobUrl;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.download = filename || "verification-document";
          document.body.appendChild(link);
          link.click();
          link.remove();

          setTimeout(() => URL.revokeObjectURL(blobUrl), 30000);
        } catch (error) {
          setMessage(dashboardMessage, error.message, "error");
        }
      };

      window.deleteManagedUser = async (userId, name, role) => {
        const confirmed = await confirmAction(
          `Delete ${role} account for ${name}? This action is permanent.`
        );
        if (!confirmed) return;

        try {
          const res = await adminFetch(`${API}/users/${userId}`, {
            method: "DELETE",
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.message || "Failed to delete user");
          }
          setMessage(dashboardMessage, data.message, "success");
          await loadRequests();
          await loadUsers();
        } catch (error) {
          setMessage(dashboardMessage, error.message, "error");
        }
      };

      document.getElementById("loginBtn").addEventListener("click", async () => {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        try {
          setMessage(loginMessage, "", "");
          const res = await fetch(`${API}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.message || "Login failed");
          }
          localStorage.setItem("admin_token", data.token);
          switchView(true);
          await loadRequests();
          await loadUsers();
        } catch (error) {
          setMessage(loginMessage, error.message, "error");
        }
      });

      document.getElementById("refreshBtn").addEventListener("click", async () => {
        await loadRequests();
        await loadUsers();
      });
      document.getElementById("reloadUsersBtn").addEventListener("click", loadUsers);
      roleFilter.addEventListener("change", loadUsers);
      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("admin_token");
        switchView(false);
        setMessage(dashboardMessage, "", "");
      });

      if (getToken()) {
        switchView(true);
        loadRequests();
        loadUsers();
      } else {
        switchView(false);
      }
    </script>
  </body>
</html>
